[tools]
python = "3.14.3"
uv = "latest"

[settings]
python.uv_venv_auto = true

[tasks.dev]
run = "uv tool run maturin develop -m ./Cargo.toml"
sources = ["src/**/*.rs", "Cargo.toml"]
outputs = { auto = true }

[tasks.build]
run = "uv tool run maturin build -m ./Cargo.toml"
outputs = { auto = true }
sources = ["src/**/*.rs", "Cargo.toml"]

[tasks.lint]
run = "uv tool run ruff check"

[tasks."generate-ci"]
run = "uv tool run maturin generate-ci  -o ../../.github/workflows/python.yml -m ./Cargo.toml --pytest github"

[tasks.format]
run = "uv --preview-features format format"

[tasks.snapshot]
depends = [":test --snapshot-update"]

[tasks.test]
run = "uv tool run -w syrupy -w pytest-asyncio -w . --refresh pytest -vv"
