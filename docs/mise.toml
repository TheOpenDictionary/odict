[tools]
node = "24"

[deps.yarn]
auto = true

[tasks.dev]
depends = ["//:docgen"]
run = "yarn dev"

[tasks.build]
run = "yarn build"
depends = ["//:docgen"]
outputs = { auto = true }
sources = ["src/**/*", "package.json"]

[tasks.check]
run = ["yarn check", "rumdl lint **/*.md"]

[tasks.format]
run = ["oxfmt .", "rumdl format **/*.md"]
