[tools]
node = "24"

[deps.yarn]
auto = true

[tasks.dev]
depends = ["//:docgen"]
run = "yarn dev"

[tasks.build]
depends = ["//:docgen"]
outputs = { auto = true }
run = "yarn build"
sources = ["src/**/*", "package.json"]

[tasks.check]
run = ["yarn check", "rumdl check ."]

[tasks.format]
run = ["oxfmt .", "rumdl fmt ."]
