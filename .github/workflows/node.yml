name: Node
env:
  DEBUG: napi:*
  APP_NAME: node
  MACOSX_DEPLOYMENT_TARGET: "10.13"
  CARGO_INCREMENTAL: "1"
  MISE_BACKENDS_YARN: "npm:@yarnpkg/cli-dist"
"on":
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example node/v2.3.0
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - "node/**"
      - "crates/odict/**"
      - "**/mise.toml"
      - "mise.toml"
      - "examples/**"
      - ".github/workflows/node.yml"
    tags:
      - "node**"
  pull_request: null
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: false
          cache: true
          experimental: true
      - name: Install lint tools
        run: |
          mise --no-hooks install rust npm:oxlint
          mise --no-hooks install -C node node yarn
      - name: Install clippy
        run: rustup component add clippy
      - name: Run lint
        run: mise run --skip-tools --no-deps //node:check
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-15-intel
            target: x86_64-apple-darwin
            build: mise run --skip-tools --no-deps //node:build --target x86_64-apple-darwin
          - host: windows-latest
            build: mise run --skip-tools --no-deps //node:build --target x86_64-pc-windows-msvc
            target: x86_64-pc-windows-msvc
          - host: windows-latest
            build: mise run --skip-tools --no-deps //node:build --target i686-pc-windows-msvc
            target: i686-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            install_zig: true
            build: mise run --skip-tools --no-deps //node:build --target x86_64-unknown-linux-gnu -x
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            install_zig: true
            build: mise run --skip-tools --no-deps //node:build --target x86_64-unknown-linux-musl -x
          - host: macos-latest
            target: aarch64-apple-darwin
            build: mise run --skip-tools --no-deps //node:build --target aarch64-apple-darwin
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            install_zig: true
            build: mise run --skip-tools --no-deps //node:build --target aarch64-unknown-linux-gnu -x
          - host: ubuntu-latest
            target: aarch64-linux-android
            build: mise run --skip-tools --no-deps //node:build --target aarch64-linux-android
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            install_zig: true
            build: mise run --skip-tools --no-deps //node:build --target aarch64-unknown-linux-musl -x
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            build: mise run --skip-tools --no-deps //node:build --target aarch64-pc-windows-msvc
          - host: ubuntu-latest
            target: wasm32-wasip1-threads
            setup: |
              wget -q https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-32/wasi-sdk-32.0-x86_64-linux.tar.gz
              tar -xf wasi-sdk-32.0-x86_64-linux.tar.gz
              echo "WASI_SDK_PATH=${GITHUB_WORKSPACE}/wasi-sdk-32.0-x86_64-linux" >> $GITHUB_ENV
              echo "CC_wasm32_wasip1_threads=${GITHUB_WORKSPACE}/wasi-sdk-32.0-x86_64-linux/bin/clang" >> $GITHUB_ENV
              echo "AR_wasm32_wasip1_threads=${GITHUB_WORKSPACE}/wasi-sdk-32.0-x86_64-linux/bin/llvm-ar" >> $GITHUB_ENV
              echo "CMAKE_BUILD_PARALLEL_LEVEL=2" >> $GITHUB_ENV
            build: mise run --skip-tools --no-deps //node:build:wasm
    name: stable - ${{ matrix.settings.target }} - node@24
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: false
          cache: true
          experimental: true
      - name: Install build tools
        run: |
          mise --no-hooks install rust
          mise --no-hooks install -C node node yarn
          if [[ "${{ matrix.settings.install_zig == true }}" == "true" ]]; then
            mise --no-hooks install zig
          fi
        shell: bash
      - name: Install dependencies
        run: mise exec --no-deps -C node -- yarn install --immutable
        shell: bash
        env:
          MISE_EXEC_AUTO_INSTALL: "false"
      - name: Add Rust target
        run: mise exec --no-deps rust -- rustup target add ${{ matrix.settings.target }}
        env:
          MISE_EXEC_AUTO_INSTALL: "false"
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.napi-rs
            .cargo-cache
            target/
          key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}
      - name: Setup toolchain
        run: ${{ matrix.settings.setup }}
        if: ${{ matrix.settings.setup }}
        shell: bash
      - name: Build
        run: ${{ matrix.settings.build }}
        shell: bash
        env:
          MSYS_NO_PATHCONV: "1"
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            ./node/${{ env.APP_NAME }}.*.node
            ./node/${{ env.APP_NAME }}.*.wasm
          if-no-files-found: error
  build-freebsd:
    runs-on: ubuntu-latest
    name: Build FreeBSD
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Build
        id: build
        uses: cross-platform-actions/action@v0.32.0
        env:
          DEBUG: napi:*
          RUSTUP_IO_THREADS: 1
        with:
          operating_system: freebsd
          version: "15.0"
          memory: 8G
          cpu_count: 3
          environment_variables: DEBUG RUSTUP_IO_THREADS
          shell: bash
          run: |
            sudo pkg install -y -f curl node libnghttp2 npm cmake
            sudo npm install -g @yarnpkg/cli-dist@4.17.0 --ignore-scripts
            curl https://sh.rustup.rs -sSf --output rustup.sh
            sh rustup.sh -y --profile minimal --default-toolchain stable
            source "$HOME/.cargo/env"
            echo "~~~~ rustc --version ~~~~"
            rustc --version
            echo "~~~~ node -v ~~~~"
            node -v
            echo "~~~~ yarn --version ~~~~"
            yarn --version
            pwd
            ls -lah
            whoami
            env
            freebsd-version
            cd node
            yarn install
            yarn build:node
            rm -rf node_modules
            rm -rf target
            rm -rf .yarn/cache
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-freebsd
          path: ./node/${{ env.APP_NAME }}.*.node
          if-no-files-found: error
  test-macOS-windows-binding:
    name: Test bindings on ${{ matrix.settings.target }} - node@${{ matrix.node }}
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            architecture: x64
          - host: windows-11-arm
            target: aarch64-pc-windows-msvc
            architecture: arm64
          - host: macos-latest
            target: aarch64-apple-darwin
            architecture: arm64
          - host: macos-15-intel
            target: x86_64-apple-darwin
            architecture: x64
        node:
          - "24"
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: false
          cache: true
          experimental: true
        env:
          MISE_NODE_VERSION: ${{ matrix.node }}
      - name: Install Node
        run: mise --no-hooks install -C node node yarn
        env:
          MISE_NODE_VERSION: ${{ matrix.node }}
      - name: Install dependencies
        run: mise exec --no-deps -C node -- yarn install --immutable
        env:
          MISE_EXEC_AUTO_INSTALL: "false"
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: bindings-${{ matrix.settings.target }}
          path: ./node
      - name: List packages
        run: ls -R .
        shell: bash
      - name: Test bindings
        run: mise run --skip-tools --no-deps //node:test
  test-linux-binding:
    name: Test ${{ matrix.target }} - node@${{ matrix.node }}
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
        node:
          - "24"
    runs-on: ${{ contains(matrix.target, 'aarch64') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: false
          cache: true
          experimental: true
      - name: Install Node
        run: mise --no-hooks install -C node node yarn
      - name: Output docker params
        id: docker
        run: |
          node -e "
            if ('${{ matrix.target }}'.startsWith('aarch64')) {
              console.log('PLATFORM=linux/arm64')
            } else {
              console.log('PLATFORM=linux/amd64')
            }
          " >> "$GITHUB_OUTPUT"
          node -e "
            if ('${{ matrix.target }}'.endsWith('-musl')) {
              console.log('IMAGE=node:${{ matrix.node }}-alpine')
            } else {
              console.log('IMAGE=node:${{ matrix.node }}-slim')
            }
          " >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        run: |
          mise exec --no-deps -C node -- yarn config set --json supportedArchitectures.cpu '["current", "arm64", "x64"]'
          mise exec --no-deps -C node -- yarn config set --json supportedArchitectures.libc '["current", "musl", "gnu"]'
          mise exec --no-deps -C node -- yarn install --immutable
        env:
          MISE_EXEC_AUTO_INSTALL: "false"
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: bindings-${{ matrix.target }}
          path: ./node
      - name: List packages
        run: ls -R .
        shell: bash
      - name: Test bindings
        uses: tj-actions/docker-run@v2
        with:
          image: ${{ steps.docker.outputs.IMAGE }}
          name: test-bindings-${{ matrix.target }}
          options: "-v ${{ github.workspace }}:${{ github.workspace }} -w ${{ github.workspace }} --platform ${{ steps.docker.outputs.PLATFORM }}"
          args: sh -c "(command -v apk >/dev/null && apk add --no-cache ca-certificates) || (apt-get update -y && apt-get install -y ca-certificates); cd node && npm_config_optional=true npm exec --yes --package @yarnpkg/cli-dist@4.17.0 -- yarn test"
  test-wasi:
    name: Test WASI target
    needs:
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: false
          cache: true
          experimental: true
      - name: Install Node
        run: mise --no-hooks install -C node node yarn
      - name: Install dependencies
        run: |
          mise exec --no-deps -C node -- yarn config set supportedArchitectures.cpu "wasm32"
          mise exec --no-deps -C node -- yarn install --immutable
        env:
          MISE_EXEC_AUTO_INSTALL: "false"
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: bindings-wasm32-wasip1-threads
          path: ./node
      - name: List packages
        run: ls -R .
        shell: bash
      - name: Test bindings
        run: mise run --skip-tools --no-deps //node:test
        env:
          NAPI_RS_FORCE_WASI: 1
  publish:
    name: Publish
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/node/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '') }}
    permissions:
      contents: write
      id-token: write
    needs:
      - lint
      - build-freebsd
      - test-macOS-windows-binding
      - test-linux-binding
      - test-wasi
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: false
          cache: true
          experimental: true
      - name: Install Node
        run: mise --no-hooks install -C node node yarn
      - name: Install dependencies
        run: mise exec --no-deps -C node -- yarn install --immutable
        env:
          MISE_EXEC_AUTO_INSTALL: "false"
      - name: create npm dirs
        run: mise run --skip-tools --no-deps //node:create-dirs
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./node/artifacts
      - name: Move artifacts
        run: mise run --skip-tools --no-deps //node:artifacts
      - name: List packages
        run: ls -R ./npm
        shell: bash
        working-directory: node
      - name: Publish
        shell: bash
        working-directory: node
        run: |
          set -euo pipefail
          npm config set provenance true
          if [[ "$RELEASE_TAG" != node/v* ]]; then
            echo "Expected a node/v* release tag, got: $RELEASE_TAG" >&2
            exit 1
          fi
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
          version="${RELEASE_TAG#node/v}"
          package_version="$(node -p "require('./package.json').version")"
          if [[ "$version" != "$package_version" ]]; then
            echo "Tag version $version does not match package.json version $package_version" >&2
            exit 1
          fi
          if [[ "$version" == *-* ]]; then
            npm publish --no-git-checks --tag next --access public
          else
            npm publish --no-git-checks --access public
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
