name: Build Docs

on:
  pull_request:
    paths:
      - "docs/**"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v7
      - name: Install tools
        uses: jdx/mise-action@v4
        env:
          MISE_NO_HOOKS: 1
        with:
          install: true
          install_args: "node yarn"
          working_directory: "docs"
      - name: Build site
        working-directory: docs
        run: yarn build
        env:
          GITHUB_TOKEN: ${{ github.token }}
