[tools]
node = "24.11.1"

[deps.yarn]
auto = true
run = "corepack enable && corepack install && yarn install"

[tasks."build:node"]
alias = "build"
env = { "AWS_LC_SYS_NO_JITTER_ENTROPY" = 1 }
run = "yarn build:node"

[tasks."create-dirs"]
run = "yarn create-dirs"

[tasks.artifacts]
run = "yarn artifacts"

[tasks."build:wasm"]
run = ["yarn build:wasm"]

[tasks.format]
run = ["oxfmt --write .", "taplo format", "cargo fmt"]

[tasks.check]
outputs = { auto = true }
run = ["cargo clippy --manifest-path Cargo.toml --quiet", "oxlint ."]
sources = ["src/**/*.rs", "*.js"]

[tasks."dev:wasm"]
depends = [":build:wasm"]
run = "yarn dev:wasm"

[tasks.upgrade]
run = "yarn up"

[tasks.publish]
run = "npm publish"

[tasks.test]
run = "yarn test"

[tasks.snapshot]
depends = [":test -u"]

[tasks.ci]
hide = true
run = 'mise x act@latest -- act napi --container-architecture linux/amd64 --bind --job {{arg(name="job_id")}}'
